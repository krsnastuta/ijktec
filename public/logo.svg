<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="1.5">
  <!-- Outer border -->
  <rect x="5" y="5" width="90" height="90" rx="20" class="logo-bg" fill="var(--color-bg)" stroke="var(--color-border)" stroke-width="2"/>
  
  <!-- Stamp: estd. 2026 in top right -->
  <text x="68" y="24" font-family="'Cabinet Grotesk', sans-serif" font-size="5" font-weight="bold" fill="var(--color-accent)" letter-spacing="0.2">ESTD 2026</text>
  
  <!-- Monogram ijk (Fluid, italic, hand-lettered style) -->
  <g transform="translate(18, 25)">
    <!-- Letter 'i' -->
    <path d="M12 25 C12 20, 14 18, 16 18 C18 18, 19 20, 19 25 L19 40 C19 42, 17 44, 15 44" stroke="var(--color-text)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="16" cy="10" r="2.5" fill="var(--color-accent)" />
    
    <!-- Letter 'j' -->
    <path d="M28 18 L28 48 C28 56, 22 60, 16 60 C12 60, 10 58, 10 55" stroke="var(--color-text)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="28" cy="10" r="2.5" fill="var(--color-accent)" />
    
    <!-- Letter 'k' -->
    <path d="M42 12 L42 44" stroke="var(--color-text)" stroke-width="3.5" stroke-linecap="round" />
    <path d="M54 18 L43 30 L54 44" stroke="var(--color-text)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M43 30 L49 30" stroke="var(--color-text)" stroke-width="3.5" stroke-linecap="round" />
  </g>
</svg>
